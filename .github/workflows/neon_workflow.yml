name: Create/Delete Neon Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  setup-branch:
    if: |
      github.event.action == 'opened' ||
      github.event.action == 'reopened' ||
      github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Create Neon branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          api_key: ${{ env.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.number }}
          username: neondb_owner

      - name: Post branch info as PR comment
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        uses: actions/github-script@v7
        env:
          NEON_BRANCH_NAME: preview/pr-${{ github.event.number }}
        with:
          script: |
            const body = [
              "### Neon Preview Branch",
              "",
              "| Property | Value |",
              "|----------|-------|",
              `| **Branch** | \`${process.env.NEON_BRANCH_NAME}\` |`,
              "| **Host** | `See Neon console` |",
              "",
              "This branch will be deleted when the PR is closed.",
            ].join("\n");

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  delete-branch:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          api_key: ${{ env.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.number }}
